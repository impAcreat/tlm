_base_: ../../../../benchmarks/skillopt/configs/_base_/default.yaml
model:
  optimizer: gpt-5.5
  target: Qwen/Qwen3.5-4B
  optimizer_backend: openai_chat
  target_backend: openai_chat
  reasoning_effort: medium
train: {num_epochs: 1, train_size: 6, batch_size: 6, accumulation: 1, seed: 42}
gradient: {minibatch_size: 3, merge_batch_size: 3, analyst_workers: 1, failure_only: false}
optimizer:
  learning_rate: 2
  min_learning_rate: 2
  lr_scheduler: constant
  use_slow_update: false
  use_meta_skill: false
evaluation: {use_gate: true, sel_env_num: 3, test_env_num: 3, eval_test: true}
env:
  name: scienceworld
  skill_init: research/steering/benchmarks/skills/scienceworld_initial.md
  split_dir: research/steering/benchmarks/data/scienceworld
  model_path: models/Qwen3.5-4B
  device: cuda:1
  max_steps: 20
  simplification: easy
  out_root: outputs/skillopt_scienceworld_light

