_base_: ../../../../benchmarks/skillopt/configs/_base_/default.yaml
model:
  optimizer: gpt-5.5
  target: Qwen/Qwen3.5-4B
  optimizer_backend: openai_chat
  target_backend: openai_chat
  reasoning_effort: medium
train: {num_epochs: 1, train_size: 3, batch_size: 3, accumulation: 1, seed: 42}
gradient: {minibatch_size: 3, merge_batch_size: 3, analyst_workers: 1, failure_only: false}
optimizer:
  learning_rate: 2
  min_learning_rate: 2
  lr_scheduler: constant
  use_slow_update: false
  use_meta_skill: false
evaluation: {use_gate: true, sel_env_num: 3, test_env_num: 3, eval_test: true}
env:
  name: appworld
  skill_init: research/steering/benchmarks/skills/appworld_initial.md
  split_dir: research/steering/benchmarks/data/appworld
  model_path: models/Qwen3.5-4B
  data_root: benchmarks/appworld
  device: cuda:2
  max_steps: 10
  out_root: outputs/skillopt_appworld_light
